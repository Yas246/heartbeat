name: API Ping

on:
  schedule:
    - cron: "0 4,9,14,19 * * *" # 05h, 10h, 15h, 20h local (UTC+1)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call API
        run: |
          for i in {1..3}; do
            curl -X POST https://api.z.ai/api/coding/paas/v4/chat/completions \
            -H "Authorization: Bearer ${{ secrets.API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"model":"GLM-4.5-air","messages":[{"role":"user","content":"."}]}' \
            && break
            sleep 10
          done
